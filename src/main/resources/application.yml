spring:
  application:
    name: event-booking

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:9000/events_booking}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true


server:
  port: ${SERVER_PORT:8080}
#  error:
#    include-message: always
#    include-binding-errors: always

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE