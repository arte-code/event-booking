services:
  postgres:
    image: 'postgres:18'
    environment:
      - 'POSTGRES_DB=events_booking'
      - 'POSTGRES_PASSWORD=postgres'
      - 'POSTGRES_USER=postgres'
    ports:
      - '9000:5432'
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres -d events_booking' ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
